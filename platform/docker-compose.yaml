services:
  minio:
    image: minio/minio
    container_name: minio
    command: server --console-address ":9001" /data
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password
      MINIO_DOMAIN: minio
    ports:
      - 9000:9000 # API
      - 9001:9001 # Console
    volumes:
      - ../../data/minio:/data # Mount local ../minio directory to /data
    networks:
      - spark-network

  postgres:
    image: postgres:16
    container_name: postgres
    ports:
      - 5432:5432
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres # Default DB; init script creates others
    volumes:
      - ../../data/postgres:/var/lib/postgresql/data
      - ./postgres/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh
    networks:
      - spark-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  jupyter:
    build:
      context: ..
      dockerfile: platform/Dockerfile.jupyter
    container_name: jupyter
    depends_on:
      - minio
      - postgres
      - lakekeeper
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password
      AWS_ACCESS_KEY_ID: admin
      AWS_SECRET_ACCESS_KEY: password
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - ../analyses:/home/iceberg/notebooks # for Jupyter work
      - ../processor:/home/iceberg/processor
      - ./libs/hadoop-aws-3.3.4.jar:/opt/spark/jars/hadoop-aws-3.3.4.jar
      - ./libs/aws-java-sdk-bundle-1.12.262.jar:/opt/spark/jars/aws-java-sdk-bundle-1.12.262.jar
      - ./libs/postgresql-42.7.8.jar:/opt/spark/jars/postgresql-42.7.8.jar
      - ./libs/trino-jdbc-368.jar:/opt/spark/jars/trino-jdbc-368.jar
      - ./conf/spark-defaults.conf:/opt/spark/conf/spark-defaults.conf
    ports:
      - 8888:8888 # JupyterLab -> localhost:8888
    networks:
      - spark-network

  lakekeeper-db-init:
    image: postgres:16
    container_name: lakekeeper-db-init
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGPASSWORD: postgres
    entrypoint: ["/bin/bash", "-c", "psql -h postgres -U postgres -c 'CREATE DATABASE lakekeeper' || true"]
    networks:
      - spark-network
    restart: "no"

  lakekeeper-migrate:
    image: quay.io/lakekeeper/catalog:latest
    container_name: lakekeeper-migrate
    depends_on:
      lakekeeper-db-init:
        condition: service_completed_successfully
    environment:
      LAKEKEEPER__PG_ENCRYPTION_KEY: 'change-this-to-a-random-32-char-key!'
      LAKEKEEPER__PG_DATABASE_URL_READ:  postgresql://postgres:postgres@postgres:5432/lakekeeper
      LAKEKEEPER__PG_DATABASE_URL_WRITE: postgresql://postgres:postgres@postgres:5432/lakekeeper
    command: ["migrate"]
    networks:
      - spark-network
    restart: "no"

  lakekeeper:
    image: quay.io/lakekeeper/catalog:latest
    container_name: lakekeeper
    depends_on:
      lakekeeper-migrate:
        condition: service_completed_successfully
    environment:
      LAKEKEEPER__PG_ENCRYPTION_KEY: 'change-this-to-a-random-32-char-key!'
      LAKEKEEPER__PG_DATABASE_URL_READ:  postgresql://postgres:postgres@postgres:5432/lakekeeper
      LAKEKEEPER__PG_DATABASE_URL_WRITE: postgresql://postgres:postgres@postgres:5432/lakekeeper
    command: ["serve"]
    ports:
      - 8181:8181 # UI + REST catalog API
    networks:
      - spark-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8181/health"]
      interval: 15s
      timeout: 5s
      retries: 10

  airflow:
    build:
      context: ..
      dockerfile: platform/Dockerfile.airflow
    container_name: airflow
    restart: always
    environment:
      ENDPOINT_URL: minio:9000 # FIXME
      AWS_ACCESS_KEY_ID: admin # FIXME
      AWS_SECRET_ACCESS_KEY: password # FIXME
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://postgres:postgres@postgres:5432/airflow
      AIRFLOW__CORE__FERNET_KEY: 'gVqOwBQL2OeREGfnmwnuhR5QliF0yRHcXYr5x7cyxPU='
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
      RATELIMIT_ENABLED: 'false'
    ports:
      - 8080:8080
    depends_on:
      postgres:
        condition: service_started
    volumes:
      - ./libs:/opt/airflow/libs
      - ./logs/airflow:/opt/airflow/logs
      - ../pipelines:/opt/airflow/dags # DAG files (Python DAG definitions)
      - ../processor:/opt/airflow/jobs # The container that actually runs spark-submit needs access to the .py file
      - ../models:/opt/airflow/models
    networks:
      - spark-network
    command: |
      bash -c "
      airflow db init
      airflow users create --username admin --firstname Admin --lastname User --role Admin --email admin@example.com --password password || true
      airflow webserver --port 8080 &
      airflow scheduler
      "

networks:
  spark-network:
    driver: bridge
